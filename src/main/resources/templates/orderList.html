<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order List</title>
</head>
<body>
<h1>Order List</h1>
<p th:text="'Author: ' + ${author}">Author: -</p>

<table border="1">
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${orders.isEmpty()}">
        <td colspan="3">No orders found.</td>
    </tr>
    <tr th:each="order : ${orders}">
        <td th:text="${order.id}">id</td>
        <td th:text="${order.status}">status</td>
        <td><a th:href="@{/order/pay/{id}(id=${order.id})}">Pay</a></td>
    </tr>
    </tbody>
</table>

<p><a th:href="@{/order/history}">Back to Search</a></p>
</body>
</html>
