<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Admin Detail</title>
</head>
<body>
<h1>Payment Admin Detail</h1>
<p th:text="'Payment ID: ' + ${payment.id}">Payment ID</p>
<p th:text="'Order ID: ' + ${payment.orderId}">Order ID</p>
<p th:text="'Method: ' + ${payment.method}">Method</p>
<p th:text="'Status: ' + ${payment.status}">Status</p>

<form th:action="@{/payment/admin/set-status/{id}(id=${payment.id})}" method="post">
    <button type="submit" name="status" value="SUCCESS">Accept</button>
    <button type="submit" name="status" value="REJECTED">Reject</button>
</form>
</body>
</html>
